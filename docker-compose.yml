name: nearcart

services:
  # MongoDB Service
  mongodb:
    image: mongo:7.0
    container_name: nearCart_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - nearCart-network

  # Backend Application Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nearCart_backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "3030:3030"

    depends_on:
      - mongodb

    networks:
      - nearCart-network

    volumes:
      - ./logs:/app/logs

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  nearCart-network:
    driver: bridge